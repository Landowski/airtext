<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <title>Airtext PRO</title>
    <link rel="icon" href="imagens/favicon.svg" sizes="any" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="../firebase/firebase-app.js"></script>
    <script src="../firebase/firebase-auth.js"></script>
    <script src="../firebase/firebase-firestore.js"></script>
    <script src="../firebase/firebase-config.js"></script>
    <script src="../js/confetti.browser.js"></script>
    <style>
        html, body {
            font-family: "Roboto", sans-serif;
            color: #111;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        h2 {
            margin: 0;
            margin-bottom: 5px;
        }

        p {
            margin-top: 0;
            margin-bottom: 25px;
        }

        button {
            width: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-size: 20px;
            padding: 10px 20px;
            border-radius: 6px;
            outline: none;
            border: none;
            background-color: #2D6AFF;
            border-bottom: 3px solid #0032b1;
            color: white;
        }

        button:hover {
            background-color: #1557ff;
        }

        #barreira {
            width: 100%;
            height: 100%;
            position: fixed;
            background-color: white;
        }
        #carregando {
            width: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 20px;
        }
        #sucesso {
            display: none;
            width: fit-content;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div id="barreira"></div>
    <div id="carregando">
        <img src="../imagens/carregando.svg" width="24" height="24">
        🇬🇧 Loading...<br/>
        🇧🇷 Carregando...<br/>
        🇪🇸 Cargando...
    </div>
    <div id="sucesso">
        <span style="font-size: 52px">🥳</span>
        <h2>Congratulations! You have subscribed to Airtext PRO!</h2>
        <h2>Parabéns! Você assinou o Airtext PRO!</h2>
        <h2>¡Felicidades! ¡Te has suscrito a Airtext PRO!</h2>
        <button id="app">Go to App / Ir para o App / Ir a la aplicación</button>
    </div>

    <script src="../js/pro.js"></script>

</body>
</html>
